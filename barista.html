<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Oriol Café - Barista</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0E0E0E;
  color:white;
  padding:20px;
}

h1{margin-bottom:20px}

.order{
  background:#171717;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

button{
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.proceso{background:#444;color:white;}
.listo{background:#C8A27A;color:black;}
.entregado{background:#7FB069;color:black;}
</style>
</head>

<body>

<h1>☕ Oriol Café - Barista</h1>
<div id="orders">Cargando pedidos...</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyklCo_0hj7D-1vBWblwS_zdfCnZbQEXOk__WEOOJ7P12rznjlswbzJSHOrihsrfxG8Bw/exec";

// 🔄 CARGAR PEDIDOS
async function loadOrders(){
  try{
    const res = await fetch(API + "?t=" + Date.now());
    const data = await res.json();

    if(!data.length){
      document.getElementById("orders").innerHTML = "No hay pedidos aún";
      return;
    }

    let html = "";

    data.slice(-20).reverse().forEach(o => {
      html += `
        <div class="order">
          <strong>#${o.id} - ${o.name}</strong><br>
          ${o.drink} (${o.milk})<br><br>

          Estado: <strong>${o.status || "En proceso"}</strong><br><br>

          <button class="proceso" onclick="setStatus(${o.id}, 'En proceso')">Proceso</button>
          <button class="listo" onclick="setStatus(${o.id}, 'Listo')">Listo</button>
          <button class="entregado" onclick="setStatus(${o.id}, 'Entregado')">Entregado</button>
        </div>
      `;
    });

    document.getElementById("orders").innerHTML = html;

  }catch(e){
    console.error(e);
    document.getElementById("orders").innerHTML = "Error cargando pedidos";
  }
}


// 🔥 FUNCIÓN CORREGIDA (ANTI-CORS)
async function setStatus(id,status){

  console.log("Click:", id, status);

  try{
    await fetch(API, {
      method: "POST",
      mode: "no-cors", // 👈 evita bloqueo CORS
      headers: {
        "Content-Type": "text/plain" // 👈 evita preflight
      },
      body: JSON.stringify({
        action: "update",
        id: id,
        status: status
      })
    });

    console.log("Status enviado");

  }catch(e){
    console.error("Error:", e);
  }

  // esperar un poco para que el backend actualice
  setTimeout(loadOrders, 800);
}


// 🔄 AUTO REFRESH
setInterval(loadOrders, 2000);
loadOrders();
</script>

</body>
</html>

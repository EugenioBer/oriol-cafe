<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oriol Café</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0E0E0E;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container{width:100%;max-width:400px;padding:20px}
.screen{display:none}
.active{display:block}

h1,h2{margin-bottom:10px}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#C8A27A;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#171717;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

.nav{
  display:flex;
  gap:10px;
}

.loading{
  opacity:0.5;
  pointer-events:none;
}
</style>
</head>

<body>
<div class="container">

<!-- NOMBRE -->
<div class="screen active" id="name">
  <h1>Oriol Café ☕</h1>
  <p>¿Cuál es tu nombre?</p>
  <input id="username" placeholder="Tu nombre">
  <button onclick="saveName()">Continuar</button>
</div>

<!-- BEBIDA -->
<div class="screen" id="menu">
  <h2>Elige tu bebida</h2>
  <div class="card" onclick="selectDrink('Latte')">Latte</div>
  <div class="card" onclick="selectDrink('Iced Latte')">Iced Latte</div>
  <div class="card" onclick="selectDrink('Cold Brew')">Cold Brew</div>
  <div class="card" onclick="selectDrink('Espresso')">Espresso</div>

  <div class="nav">
    <button onclick="back('name')">Atrás</button>
  </div>
</div>

<!-- LECHE -->
<div class="screen" id="milk">
  <h2>Tipo de leche</h2>
  <div class="card" onclick="sendOrder('Entera')">Entera</div>
  <div class="card" onclick="sendOrder('Deslactosada')">Deslactosada</div>
  <div class="card" onclick="sendOrder('Deslactosada Light')">Deslactosada Light</div>
  <div class="card" onclick="sendOrder('Avena')">Avena</div>
  <div class="card" onclick="sendOrder('Coco')">Coco</div>

  <div class="nav">
    <button onclick="back('menu')">Atrás</button>
  </div>
</div>

<!-- FINAL -->
<div class="screen" id="done">
  <h2 id="status">☕ Preparando tu pedido...</h2>
  <p id="summary"></p>
</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyklCo_0hj7D-1vBWblwS_zdfCnZbQEXOk__WEOOJ7P12rznjlswbzJSHOrihsrfxG8Bw/exec";

let order = {};
let orderId = null;
let loading = false;

function next(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function back(id){ next(id); }

function saveName(){
  const name = document.getElementById('username').value;
  if(!name){
    alert("Escribe tu nombre");
    return;
  }
  order.name = name;
  next('menu');
}

function selectDrink(drink){
  order.drink = drink;
  next('milk');
}

async function sendOrder(milk){
  if(loading) return;
  loading = true;

  document.body.classList.add("loading");

  order.milk = milk;

  try{
    const res = await fetch(API,{
      method:"POST",
      body: JSON.stringify(order)
    });

    const data = await res.json();
    orderId = data.id;

    document.getElementById("summary").innerText =
      `Pedido #${orderId} - ${order.drink} (${order.milk})`;

    next('done');

    trackStatus();

  }catch(e){
    alert("Error enviando pedido");
    loading = false;
    document.body.classList.remove("loading");
  }
}

function trackStatus(){
  setInterval(async ()=>{
    const res = await fetch(API);
    const data = await res.json();

    const o = data.find(x => x.id == orderId);

    if(o){
      document.getElementById("status").innerText =
        o.status === "Listo"
        ? "✅ Pedido listo"
        : o.status === "Entregado"
        ? "🎉 Pedido entregado"
        : "☕ Preparando tu pedido...";
    }
  },2000);
}
</script>

</body>
</html>
